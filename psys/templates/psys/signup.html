{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>従業員アカウント登録</title>
  <link rel="stylesheet" href="{% static 'psys/CSS/login.css' %}">
</head>
<body>

  <h2>従業員アカウント登録</h2>

  {% if form.errors %}
    <p style="color:red;">
      入力内容に誤りがあります。もう一度確認してください。
    </p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <label for="id_username">従業員番号（6文字）</label><br>
    {{ form.username }}<br><br>

    <label for="id_password1">パスワード</label><br>
    {{ form.password1 }}<br><br>

    <label for="id_password2">パスワード（確認）</label><br>
    {{ form.password2 }}<br><br>

    <button type="submit">登録</button>
  </form>

  <p style="margin-top:16px;">
    <a href="{% url 'psys:login' %}">← ログイン画面へ戻る</a>
  </p>

</body>
</html>
