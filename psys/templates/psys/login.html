{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>従業員ログイン</title>
    <link rel="stylesheet" href="{% static 'psys/CSS/login.css' %}">
</head>
<body>
    <h2>従業員ログイン</h2>
    
    {% if form.errors %}
        <p style="color: red;">従業員番号またはパスワードが正しくありません。</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="id_username">従業員番号:</label>
        {{ form.username }}<br><br>

        <label for="id_password">パスワード:</label>
        {{ form.password }}<br><br>

        <button type="submit">ログイン</button>
    </form>

    <p>アカウントをお持ちでない方は <a href="{% url 'psys:signup' %}">新規登録</a> へ</p>

    <div class="back-to-top">
        <a href="{% url 'psys:index' %}" class="top-link">← トップページへ戻る</a>
    </div>
</body>
</html>
